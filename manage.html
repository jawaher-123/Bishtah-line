</h2>

<form class="admin-form">

<div class="admin-field">
<label>Abaya Name</label>
<input type="text" placeholder="Enter name" required class="admin-input">
</div>

<div class="admin-field">
<label>Price (SAR)</label>
<input type="number" placeholder="0.00" required class="admin-input">
</div>

<div class="admin-field">
<label>Abaya Photo</label>
<input type="file" accept="image/*" required class="admin-file">
</div>

<button type="submit" class="admin-btn-main">
Add Product
</button>

</form>
