<div class="container admin-page-full">

<div class="card">

<h2 style="text-align:center;margin-bottom:10px;">
Admin Registration
</h2>

<p style="text-align:center;color:#666;margin-bottom:25px;">
Set up a new administrator account.
</p>

<form action="adminlogin.html">

<input type="text"
placeholder="Admin Full Name"
required
class="admin-input-style">

<input type="email"
placeholder="Work Email"
required
class="admin-input-style">

<input type="password"
placeholder="Access Password"
required
class="admin-input-style">

<input type="text"
pattern="1122"
title="يرجى إدخال كود الصلاحية الصحيح (1122)"
placeholder="Admin Authorization Code"
required
class="admin-input-style">

<button type="submit" class="admin-btn-main">
Register as Admin
</button>

</form>


<div style="margin-top:25px;text-align:center;font-size:0.9rem;">
<p>
Already have admin access?
<a href="admin-log.html"
style="color:#70799f;font-weight:900;text-decoration:none;">

</a>

</div>
